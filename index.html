<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieSnapEditor</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MovieSnapEditor">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DY3F26415Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DY3F26415Z');
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>MovieSnapEditor</h1>
    <div class="header-actions">
      <button id="headerFileBtn" class="header-btn" title="動画ファイルを選択">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V7a2 2 0 012-2h4l2 3h10a2 2 0 012 2z"/>
          <polygon points="10,11 10,17 16,14" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="headerExtractBtn" class="header-btn" title="範囲抽出" disabled>
        <svg class="icon-default" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="22" height="13" rx="1"/>
          <line x1="6" y1="1" x2="6" y2="14"/>
          <line x1="18" y1="1" x2="18" y2="14"/>
          <line x1="1" y1="5" x2="6" y2="5"/>
          <line x1="18" y1="5" x2="23" y2="5"/>
          <line x1="1" y1="10" x2="6" y2="10"/>
          <line x1="18" y1="10" x2="23" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="20"/>
          <polyline points="9 17 12 20 15 17"/>
        </svg>
        <svg class="icon-cancel" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button id="headerStitchBtn" class="header-btn" title="縦結合して保存" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="4" rx="1"/>
          <rect x="3" y="10" width="18" height="4" rx="1"/>
          <rect x="3" y="17" width="18" height="4" rx="1"/>
        </svg>
      </button>
      <button id="headerSaveZipBtn" class="header-btn" title="元動画を保存" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="reload-btn" onclick="window.location.reload()" title="リロード">↺</button>
    </div>
  </header>

  <main class="main-content">

    <!-- センターエリア -->
    <section class="center-area">

      <!-- 動画プレビュー（ドロップゾーン兼用） -->
      <div class="video-container" id="videoContainer">
        <video id="videoPlayer" preload="metadata" playsinline webkit-playsinline></video>

        <!-- クロップオーバーレイ -->
        <div id="cropOverlay" class="crop-overlay hidden">
          <div id="cropMaskTop"    class="crop-mask"></div>
          <div id="cropMaskBottom" class="crop-mask"></div>
          <div id="cropMaskLeft"   class="crop-mask"></div>
          <div id="cropMaskRight"  class="crop-mask"></div>
          <div id="cropBox" class="crop-box">
            <div class="crop-handle" data-dir="nw"></div>
            <div class="crop-handle" data-dir="n"></div>
            <div class="crop-handle" data-dir="ne"></div>
            <div class="crop-handle" data-dir="e"></div>
            <div class="crop-handle" data-dir="se"></div>
            <div class="crop-handle" data-dir="s"></div>
            <div class="crop-handle" data-dir="sw"></div>
            <div class="crop-handle" data-dir="w"></div>
          </div>
        </div>

        <div id="videoDropOverlay" class="video-drop-overlay">
          <div class="drop-overlay-inner">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
            </svg>
            <p class="drop-overlay-text">動画ファイルをドロップ<br>またはボタンで選択</p>
            <p class="drop-overlay-formats">MP4 / WEBM / MOV / AVI / MKV</p>
          </div>
        </div>
      </div>

      <!-- 2. 動画範囲設定 / 3. クロップ範囲設定（デスクトップ: 横並び） -->
      <div class="bottom-controls-row">

      <!-- 動画範囲設定 -->
      <div class="range-controls">
        <div class="playback-row">
          <button id="playRangeButton" class="ctrl-btn" disabled>
            <svg class="btn-icon-play" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            <svg class="btn-icon-stop" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            <span>範囲再生</span>
          </button>
          <div class="time-input-group">
            <input type="text" id="startTimeInput" class="time-input" placeholder="開始" disabled>
            <button id="setStartTimeButton" class="time-set-btn" disabled title="現在の再生位置を開始点に設定">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="7" y1="4" x2="7" y2="20"/>
                <line x1="7" y1="4" x2="15" y2="4"/>
                <line x1="7" y1="20" x2="15" y2="20"/>
              </svg>
            </button>
          </div>
          <div class="time-input-group">
            <input type="text" id="endTimeInput" class="time-input" placeholder="終了" disabled>
            <button id="setEndTimeButton" class="time-set-btn" disabled title="現在の再生位置を終了点に設定">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="17" y1="4" x2="17" y2="20"/>
                <line x1="9"  y1="4" x2="17" y2="4"/>
                <line x1="9"  y1="20" x2="17" y2="20"/>
              </svg>
            </button>
          </div>
          <span id="rangeDisplay" class="range-duration">--</span>
        </div>

        <div class="slider-row">
          <span id="currentTimeDisplay" class="time-display">00:00.00</span>
          <div class="slider-wrapper">
            <input type="range" id="timeSlider" class="time-slider" min="0" max="100" value="0" step="0.01" disabled>
          </div>
          <span id="durationDisplay" class="time-display">00:00.00</span>
        </div>
      </div>

      <!-- 3. クロップ範囲設定 -->
      <div class="crop-settings-bar">
        <div class="crop-settings-header">
          <label class="checkbox-label">
            <input type="checkbox" id="includeTimestampCheck" checked>
            <span>再生時刻を画像に表示する</span>
          </label>
          <div class="crop-right-group">
            <label class="checkbox-label">
              <input type="checkbox" id="cropEnabledCheck">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--color-text-muted)">
                <polyline points="6 3 6 15 18 15"/>
                <polyline points="3 6 15 6 15 18"/>
              </svg>
              <span>画像範囲のクロップ適用</span>
            </label>
            <button id="cropDetailToggle" class="ctrl-btn crop-detail-toggle">詳細設定 ▼</button>
          </div>
        </div>
        <div id="cropDetailPanel" class="crop-detail-panel">
          <div class="crop-controls-row">
            <span class="controls-label">倍率でリサイズ：</span>
            <select id="cropScaleSelect" class="crop-scale-select">
              <option value="">-- 倍率でリサイズ --</option>
              <option value="0.25">25%</option>
              <option value="0.5">50%</option>
              <option value="0.75">75%</option>
              <option value="1.0">100%</option>
            </select>
            <button id="cropSwapBtn" class="ctrl-btn">⇄ 縦横入替</button>
          </div>
          <div class="crop-controls-row">
            <span class="controls-label">X</span>
            <input type="number" id="cropX" class="crop-num-input" min="0" value="0">
            <span class="controls-label">Y</span>
            <input type="number" id="cropY" class="crop-num-input" min="0" value="0">
            <span class="controls-label">W</span>
            <input type="number" id="cropW" class="crop-num-input" min="1" value="0">
            <span class="controls-label">H</span>
            <input type="number" id="cropH" class="crop-num-input" min="1" value="0">
          </div>
          <div class="crop-controls-row">
            <button id="cropSaveDefaultBtn" class="ctrl-btn">初期値として保存</button>
            <button id="cropRestoreDefaultBtn" class="ctrl-btn">初期値に戻す</button>
            <button id="cropResetBtn" class="ctrl-btn">全体リセット</button>
          </div>
        </div>
      </div>

      </div><!-- /.bottom-controls-row -->

      <!-- コントロールバー -->
      <div class="controls-bar">
        <input type="file" id="videoFileInput" accept="video/*">
        <div class="controls-group controls-group--options">
          <span class="controls-label">抽出間隔（秒）：</span>
          <div class="interval-buttons">
            <button class="interval-btn active" data-interval="0.2">0.2</button>
            <button class="interval-btn" data-interval="0.5">0.5</button>
            <button class="interval-btn" data-interval="1.0">1</button>
            <button class="interval-btn" data-interval="custom" title="カスタム">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
            </button>
          </div>
          <div class="custom-interval-row" id="customIntervalRow">
            <input type="number" id="customIntervalInput"
                   step="0.01" min="0.01" max="60" placeholder="例: 0.25">
            <span class="unit-label">秒</span>
          </div>
        </div>
        <div class="controls-separator"></div>
        <div class="controls-group controls-group--actions">
          <div class="btn-row">
            <button id="extractBtn" class="btn btn-primary" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="1" width="22" height="13" rx="1"/>
                <line x1="6" y1="1" x2="6" y2="14"/>
                <line x1="18" y1="1" x2="18" y2="14"/>
                <line x1="1" y1="5" x2="6" y2="5"/>
                <line x1="18" y1="5" x2="23" y2="5"/>
                <line x1="1" y1="10" x2="6" y2="10"/>
                <line x1="18" y1="10" x2="23" y2="10"/>
                <line x1="12" y1="14" x2="12" y2="20"/>
                <polyline points="9 17 12 20 15 17"/>
              </svg>
              <span>範囲抽出</span>
            </button>
            <button id="captureBtn" class="btn btn-capture" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="1"/>
                <line x1="7" y1="4" x2="7" y2="20"/>
                <line x1="17" y1="4" x2="17" y2="20"/>
                <line x1="2" y1="9" x2="7" y2="9"/>
                <line x1="17" y1="9" x2="22" y2="9"/>
                <line x1="2" y1="15" x2="7" y2="15"/>
                <line x1="17" y1="15" x2="22" y2="15"/>
              </svg>
              <span>1枚抽出</span>
            </button>
          </div>
          <div class="btn-row">
            <button id="stitchBtn" class="btn btn-secondary" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="4" rx="1"/>
                <rect x="3" y="10" width="18" height="4" rx="1"/>
                <rect x="3" y="17" width="18" height="4" rx="1"/>
              </svg>
              <span>縦結合して保存</span>
            </button>
            <button id="saveZipBtn" class="btn btn-secondary" disabled>
              <span>一括保存（ZIP）</span>
            </button>
          </div>
        </div>
        <div id="extractionProgress" class="extraction-progress hidden">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span id="progressText" class="progress-text"></span>
        </div>
      </div>
    </section>

    <!-- 右パネル: 画像ギャラリー -->
    <aside class="gallery-panel">
      <div class="gallery-header">
        <div class="gallery-title-group">
          <span class="gallery-title">画像ギャラリー</span>
          <span id="stitchLimitValue" class="gallery-stitch-limit">--</span>
        </div>
        <span id="selectionCount" class="selection-count">0/0枚選択中</span>
      </div>
      <div class="gallery-controls">
        <button id="selectAllBtn" class="btn-small">全選択</button>
        <button id="deselectAllBtn" class="btn-small">全解除</button>
      </div>
      <div id="galleryGrid" class="gallery-grid">
        <div class="gallery-placeholder">動画を選択して<br>抽出してください</div>
      </div>
    </aside>

  </main>

  <!-- 画像拡大モーダル -->
  <div id="imageModal" class="image-modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">×</button>
      <img id="modalImage" src="" alt="">
      <div id="modalTimestamp" class="modal-timestamp"></div>
    </div>
  </div>

  <footer class="status-bar">
    <span id="statusText">動画ファイルを選択してください</span>
    <div class="status-counts">
      <span class="status-count-label">抽出：</span>
      <span class="status-count-num" id="statusTotalCount">--</span>
      <span class="status-count-sep"></span>
      <span class="status-count-label">選択：</span>
      <span class="status-count-num" id="statusSelectedCount">--</span>
    </div>
  </footer>

  <!-- JS: 流用ファイル -->
  <script src="js/utils.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/fileHandler.js"></script>
  <script src="js/videoPlayer.js"></script>
  <script src="js/timeRangeManager.js"></script>
  <!-- JS: 新規ファイル -->
  <script src="js/zipExporter.js"></script>
  <script src="js/frameExtractor.js"></script>
  <script src="js/imageGallery.js"></script>
  <script src="js/coordinateTransformer.js"></script>
  <script src="js/cropSelector.js"></script>
  <script src="js/stitchProcessor.js"></script>
  <script src="js/extractionManager.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
